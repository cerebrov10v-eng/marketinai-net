# www → non-www redirect
server {
    listen 80;
    server_name www.marketinai.net;
    return 301 https://marketinai.net$request_uri;
}

server {
    listen 80;
    server_name marketinai.net _;
    root /usr/share/nginx/html;
    index index.html;

    location = /robots.txt {
        add_header Content-Type text/plain;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        add_header Content-Type application/xml;
        try_files $uri =404;
    }

    # Proxy API requests to the MarketinAI backend
    location /api/marketinai/ {
        proxy_pass http://host.docker.internal:8005/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/index.html /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
